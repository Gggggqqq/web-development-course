<!DOCTYPE html>
<html>
    <head>
        <title>Get familar with tables</title>
    </head>
    <body>

        <!--Table-->
        <table border="1">

                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
            <tr>
                <th>Hashir</th>

                <th>A</th>
            <tr>
                <th>Ramla</th>

            </tr>
        </table>
        <br>
        <!--List-->
        <h2>Subjects</h2>
        <ul>
            <li>Maths</li>
            <li>Physics</li>
            <li>computer science</li>
        </ul>
        <br>
    </body>
</html>
