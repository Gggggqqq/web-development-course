<!DOCTYPE html>
 <html>
    <head>
        <title>fieldset</title>
    </head>
    <body>
        <form>
            <fieldset>
                <!-- The fieldset tag is used to group related elements in a form and drams a box dround them -->
                <legend>personal information:</legend>
                <label>full name:</label>
                <!--placeholder attribute can be used to privide extra information about entry to be made-->
                <input type="text" id="fname" placeholder="enter name"><br><br>
                <label>Email:</label><br>
                <input type="text" id="email"><br><br>
                <label>gender</label><br>
                <input type="radio" id="female" value="female" name="gender">Female<br>
                <input type="radio" id="male" value="male" name="gender">male<br><br>
                <label>birthday:</label>
                <input type="date" id="birthday" name="birthday"><br><br>
            </fieldset>
        </form>
    </body>
    </html>
