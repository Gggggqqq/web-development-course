<!DOCTYPE html>
<html>
<head>
    <title>Here I Add Media</title>
</head>

<body>

    <h1>Here I Add Media</h1>
    <p>This webpage shows different types of media using HTML.</p>

    <!-- Image Section -->
    <h2>Image</h2>
    <p>This is an example of an image added to a webpage:</p>
    <img src="pexels-optical-chemist-340351297-34352303.jpg" alt="My Image" width="300">

    <!-- Audio Section -->
    <h2>Audio</h2>
    <p>This is an example of audio:</p>
    <audio controls>
        <source src="WhatsApp Audio 2026-04-28 at 9.47.18 AM.mp4" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <!-- Video Section -->
    <h2>Video</h2>
    <p>This is an example of a video:</p>
    <video width="400" controls>
        <source src="14756051_1080_1920_25fps.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <!-- Embedded Media -->
    <h2>Embedded YouTube Video</h2>
    <p>Example of embedded media from the internet:</p>
    <iframe width="400" height="250"
        src="https://www.youtube.com/embed/HrkZEcGlvIc?si=lqMFo0mFNjiAN4RT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        allowfullscreen>
    </iframe>

</body>
</html>
